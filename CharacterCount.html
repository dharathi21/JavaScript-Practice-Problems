<!--Create a textarea.
Requirements:
Show the number of characters typed.
Update count instantly while typing.
If characters exceed 100, display a warning message.-->
<!DOCTYPE html>
<html>
    <head>
        <title>Character count</title>
    </head>
    <body>
        <textarea id="character"></textarea>
        <p id="count">Character:0</p>
        <script>
            let char=document.getElementById("character");
            let count=0;
            let add=document.getElementById("count");
            char.addEventListener('input',(event)=>{
                count=char.value.length;
                if(count<=100){
                    add.innerText="Characters :"+count;
                }else{
                    add.innerText="Characters :"+count+" (Limit Exceeded)";
                }
               
            })
        </script>
    </body>
    
</html>
