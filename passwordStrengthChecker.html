<!--Create:
Password Input
Strength Message
Behavior
If password length is:
0      → Enter Password
1-4    → Weak
5-8    → Medium
9+     → Strong-->
<!DOCTYPE html>
<html>
<head>
    <title>PassWord Checker</title>
    <link rel="stylesheet" href="style.css">
</head>
<style>
    #password{
        width: 300px;
        height:30px;
        padding:10px;
    }
    #strength{
        font-size: 14px;
        font-weight: bold;
        font-family: 'Courier New', Courier, monospace;
    }
</style>
<body>
    <input type="password" id="password" placeholder="enter your password">
    <p id="strength">Strength :</p>
    <script>
        let pass=document.getElementById("password");
        let str=document.getElementById("strength");
        pass.addEventListener('input',(event)=>{
            let length=pass.value.length;
            if(length==0){
                str.innerText="Strength : Enter Password";
            }else if(length<=4){
                str.innerText="Strength : Weak ";
            }else if(length<=8){
                 str.innerText="Strength : Medium ";
            }else{
                 str.innerText="Strength : Strong ";
            }
       
        })
    </script>
</body>
</html>
