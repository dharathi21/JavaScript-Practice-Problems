<!--Showing the user type names and hide others-->
<!DOCTYPE html>
<html>
<head>
    <title>
        Student Name Selection
    </title>
    <link rel="stylesheet" href="style.css">
    <style>
        #search{
            background-color: rgb(239, 215, 227);
            width:350px;
            height:30px;
            padding: 10px;
        }
        #list{
            list-style-type: none;
            font-size: 19px;
            font-family: 'Courier New', Courier, monospace;
            line-height: 1.3;
            background-color: rgb(200, 194, 235);
            width: 350px;
            padding: 10px;
            border:1px solid rgb(31, 30, 30);

        }
    </style>
</head>
<body>
    <input type="text" id="search" placeholder="Search name here">
    <ul id="list">
        <li>Abi</li>
        <li>Bala</li>
        <li>Charu</li>
        <li>Dharshini</li>
        <li>Elamathi</li>
        <li>Fathima</li>
        <li>Gayathri</li>
        <li>Harini</li>
    </ul>
    <script>
        let search=document.getElementById("search");
        let lists=document.querySelectorAll("#list li");
        search.addEventListener('input',(event)=>{
             let searchValue=search.value.toLowerCase();
            lists.forEach(list=>{
               
                let studentName=list.innerText.toLowerCase();
                if(studentName.includes(searchValue)){
                    list.style.display="block";
                }else{
                    list.style.display="none";
                }
            })
        })
    </script>
</body>
</html>
